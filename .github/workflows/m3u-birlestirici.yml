name: M3U Birleştirici

on:
  schedule:
    - cron: '0 2,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  birlestir:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu klonla
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Python'u kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bağımlılıkları kur
        # aiohttp buraya eklendi, böylece m3u_tv.py hata vermeyecek
        run: pip install requests aiohttp

      - name: M3U Dosyalarını Oluştur (Sinema, Dizi, TV)
        run: |
          python m3u_sinema.py
          python m3u_dizi.py
          python m3u_tv.py

      - name: Değişiklikleri commitle ve pusha gönder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Tüm m3u dosyalarını ve varsa oluşturulan tüm json klasörlerini ekle
          git add *.m3u
          git add kayit_json_sinema/ || echo "Klasör yok"
          git add kayit_json_dizi/ || echo "Klasör yok"
          git add kayit_json_tv/ || echo "Klasör yok"
          
          git commit -m "Otomatik M3U güncellemesi (Modül hatası giderildi)" || echo "Değişiklik yok"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git push
