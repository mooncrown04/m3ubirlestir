name: M3U Birleştirici

on:
  schedule:
    - cron: '0 2,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  birlestir:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu klonla
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0 

      - name: Python'u kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bağımlılıkları kur
        run: pip install requests aiohttp

      - name: Eski M3U Dosyalarını Temizle
        # Yeni alfabetik dosyalar oluşmadan önce klasördeki tüm eski m3u'ları siliyoruz
        run: rm -f *.m3u

      - name: M3U Dosyalarını Oluştur (Sinema, Dizi, TV ve Alfabetik Bölme)
        run: |
          python m3u_sinema.py
          python m3u_dizi.py
          python m3u_tv.py
          python nuvio_sinema.py

      - name: Değişiklikleri commitle ve pusha gönder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. Yeni oluşturulan tüm m3u dosyalarını ekle
          git add *.m3u
          
          # 2. Silinen (rm ile sildiğimiz) eski dosyaları Git takibinden çıkar
          git add -u
          
          # 3. JSON klasörlerini ekle
          git add kayit_json_sinema/ || true
          git add kayit_json_dizi/ || true
          git add kayit_json_nuvio/ || true
          
          # Değişiklik kontrolü ve Commit
          if git diff --staged --quiet; then
            echo "Değişiklik yok, işlem sonlandırılıyor."
          else
            git commit -m "Eski dosyalar temizlendi ve alfabetik listeler güncellendi"
            
            # Uzak sunucudaki (GitHub) değişiklikleri çek ve kendi üzerine ekle
            git pull --rebase origin main
            
            # Token ile URL set et ve gönder
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
            git push origin main
          fi
